<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAMUELSONFRAMES</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
</head>
<body class="page-home">
 
  <!-- ══ NAVIGATION ══ -->
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="nav-brand">SAMUELSONFRAMES</a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle-input" />
      <label for="nav-toggle" class="nav-burger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link active">Portfolio</a></li>
        <li><a href="about.html" class="nav-link">About & Contact</a></li>
      </ul>
    </nav>
  </header>
 
  <!-- ══ HERO TEXTE ══ -->
  <section class="home-hero">
    <p class="home-hero-sub">Photographe — Lyon</p>
    <h1 class="home-hero-title">Choisissez<br /><em>un univers</em></h1>
  </section>
 
  <!-- ══ GRILLE 6 PHOTOS (2 par ligne, 3 lignes) ══ -->
  <main class="grid-section">
    <div class="photo-grid">
 
      <a href="moment.html"  class="photo-card">
        <div class="photo-wrap">
          <img src="./moment/moment.jpg" alt="moment"onerror="this.style.display='none'">
          <div class="photo-fallback" style="--n:1"></div>
          <div class="photo-overlay">
            <span class="photo-title">Capture un moment</span>
          </div>
        </div>
      </a>
 
      <a href="mariage.html" class="photo-card">
        <div class="photo-wrap">
          <img src="./mariage/mariage.jpg" alt="mariage" onerror="this.style.display='none'" />
          <div class="photo-fallback" style="--n:2"></div>
          <div class="photo-overlay">
            <span class="photo-title">Mariage</span>
          </div>
        </div>
      </a>
 
      <a href="shooting.html" class="photo-card">
        <div class="photo-wrap">
          <img src="./shooting/shooting.jpg" alt="Shooting" onerror="this.style.display='none'" />
          <div class="photo-fallback" style="--n:3"></div>
          <div class="photo-overlay">
            <span class="photo-title">Shooting photo</span>
          </div>
        </div>
      </a>
 
      <a href="paris.html" class="photo-card">
        <div class="photo-wrap">
          <img src="./paris/paris.jpg" alt="paris" onerror="this.style.display='none'" />

          <div class="photo-overlay">
            <span class="photo-title">Paris</span>
          </div>
        </div>
      </a>
 
      <a href="lyon.html" class="photo-card">
        <div class="photo-wrap">
          <img src="./lyon/lyon.jpg" alt="Lyon" onerror="this.style.display='none'" />
          <div class="photo-fallback" style="--n:5"></div>
          <div class="photo-overlay">
            <span class="photo-title">Lyon</span>
          </div>
        </div>
      </a>
 
      <a href="marseille.html" class="photo-card">
        <div class="photo-wrap">
          <img src="./marseille/marseille.jpg" alt="Marseille" onerror="this.style.display='none'" />
          <div class="photo-fallback" style="--n:6"></div>
          <div class="photo-overlay">
            <span class="photo-title">Marseille</span>
          </div>
        </div>
